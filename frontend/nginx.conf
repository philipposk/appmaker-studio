server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required by the in-browser preview (WebContainer). Without these two
    # headers, SharedArrayBuffer is unavailable and the live preview won't
    # boot. They mirror the dev server's setupProxy.js.
    #
    # NOTE: require-corp can block cross-origin assets (e.g. Google Fonts)
    # unless they send CORP headers. If your fonts disappear, either
    # self-host them or switch the line below to:
    #   add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Long-cache fingerprinted build assets.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: serve index.html for any unmatched path so React Router
    # can handle deep links / refreshes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML shell — it references hashed assets.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
